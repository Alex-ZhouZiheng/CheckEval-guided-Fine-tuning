definition: The response is factually accurate, logically sound, and sufficiently complete to answer the user's actual question.
  v4 changes vs v3 - deduplicated Coverage Adequacy from 6 to 4 (removed two near-paraphrases of "address main aspects"); added Ambiguity and Premise Handling sub-aspect (2 Qs covering under-specification and false premises); added Temporal Awareness sub-aspect (1 Q on time-sensitive facts and knowledge cutoff).
dimension: correctness_and_completeness
sub_aspects:
  Coverage Adequacy:
    filtered_questions:
    - Does the response address all the main aspects of the user's question without omitting key information that the user would need to consider the answer complete?
    - Does the response resolve the user's central question fully enough that no obvious follow-up is needed to obtain the basic requested information?
    - Does the response avoid leaving out important conditions, exceptions, or limitations that are central to the question?
    - When context provided by the user raises important relevant points, does the response address those points rather than ignoring them?
    original_count: 8
    removed_count: 4
    seed_question: Does the response address all the main aspects of the user's question without omitting key information that the user would need to consider the answer complete?
  Factual Accuracy:
    filtered_questions:
    - Are the factual claims in the response accurate and free from errors that would mislead the user or undermine the usefulness of the answer?
    - Does the response avoid making unsupported factual assertions or presenting speculation as established fact?
    - If the response explains a process, mechanism, or causal relationship, is that explanation factually sound?
    - When the prompt depends on domain knowledge, does the response apply that knowledge accurately without introducing factual misconceptions?
    - Does the response avoid overclaiming certainty on points that are actually unsupported or unknown?
    original_count: 7
    removed_count: 2
    seed_question: Are the factual claims in the response accurate and free from errors that would mislead the user or undermine the usefulness of the answer?
  Logical Consistency:
    filtered_questions:
    - Does the response avoid contradicting itself across different parts of the answer, so that its claims, recommendations, and reasoning form a coherent whole?
    - Does the conclusion follow logically from the reasoning presented earlier in the response?
    - Does the response avoid switching positions on the same issue without explanation?
    original_count: 4
    removed_count: 1
    seed_question: Does the response avoid contradicting itself across different parts of the answer, so that its claims, recommendations, and reasoning form a coherent whole?
  Ambiguity and Premise Handling:
    filtered_questions:
    - When the prompt contains genuine ambiguity, missing information, or under-specification, does the response surface the issue by stating an assumption, asking for clarification, or flagging the gap, rather than silently answering as if the input were complete?
    - If the prompt contains a factual mistake or unwarranted premise, does the response identify and correct it rather than building further reasoning on top of the error?
    original_count: 2
    removed_count: 0
    seed_question: When the prompt contains genuine ambiguity, missing information, or under-specification, does the response surface the issue by stating an assumption, asking for clarification, or flagging the gap, rather than silently answering as if the input were complete?
  Temporal Awareness:
    filtered_questions:
    - When the prompt asks about time-sensitive facts such as release dates, prices, current state, or recent events, does the response acknowledge knowledge cutoff or temporal uncertainty rather than presenting potentially outdated information as current truth?
    original_count: 1
    removed_count: 0
    seed_question: When the prompt asks about time-sensitive facts such as release dates, prices, current state, or recent events, does the response acknowledge knowledge cutoff or temporal uncertainty rather than presenting potentially outdated information as current truth?
