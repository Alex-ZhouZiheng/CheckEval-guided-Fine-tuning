definition: When the response contains code or technical implementation guidance, the code should solve the exact requested
  problem, use the requested tools and environment, avoid placeholders, and address the user's concrete runtime or integration
  context. v5 adds exact-functionality, environment, debugging, and integration questions to reduce ties where both responses
  are broadly code-related but only one satisfies the actual coding request.
dimension: coding_communication_conditional
sub_aspects:
  Code Accuracy:
    filtered_questions:
    - If the response includes code, is the code internally consistent with the described approach and unlikely to fail because
      of mismatched variables, missing imports, or incompatible function calls?
    - For any included code, are the commands, syntax, and APIs used in a way that is valid for the stated programming language
      or environment?
    - Does the code avoid obvious logical mistakes that would prevent it from performing the stated task?
    - When code is provided, does it avoid placeholder or pseudo-code fragments that would prevent the user from running or
      applying it as written?
    original_count: 5
    removed_count: 1
    seed_question: If the response includes code, is the code internally consistent with the described approach and unlikely
      to fail because of mismatched variables, missing imports, or incompatible function calls?
  Code Context Integration:
    filtered_questions:
    - Does the response present the code as part of solving the user's specific request, rather than as a generic example
      that could apply to many unrelated tasks?
    - Does the response connect the code to the surrounding explanation so the user can see what role the snippet plays in
      the overall solution?
    - If assumptions are required, are they consistent with the user's described situation?
    original_count: 5
    removed_count: 2
    seed_question: Does the response present the code as part of solving the user's specific request, rather than as a generic
      example that could apply to many unrelated tasks?
  Code Explainability:
    filtered_questions:
    - Does the response clarify any non-obvious parts of the code, such as key functions, parameters, or control flow, so
      the user can follow the logic?
    - Does the response give enough explanation for the user to understand how to use or adapt the code correctly in their
      situation?
    - Does the response explain what the provided code is doing at a high level so the user can connect it to the task?
    original_count: 5
    removed_count: 2
    seed_question: Does the response clarify any non-obvious parts of the code, such as key functions, parameters, or control
      flow, so the user can follow the logic?
  Code Readability:
    filtered_questions:
    - Does the code use clear naming and consistent formatting so that its structure is easy to follow?
    - Is the code organized into logical blocks or units that are easy to follow?
    original_count: 5
    removed_count: 3
    seed_question: Does the code use clear naming and consistent formatting so that its structure is easy to follow?
  Exact Functional Fit:
    filtered_questions:
    - Does the code implement the exact functionality requested by the user rather than a related simpler or more generic
      task?
    - Does the solution preserve all key input-output requirements, data structures, file paths, schemas, or interface contracts
      described in the prompt?
    - If the user requested a specific algorithm, approach, library, framework, or backend, does the response actually use
      it rather than substituting a different method?
    - Does the response avoid solving only a preliminary setup step while omitting the core implementation the user asked
      for?
    - Does the code handle the specific edge cases, dynamic patterns, or constraints explicitly mentioned in the prompt?
    original_count: 5
    removed_count: 0
    seed_question: Does the code implement the exact functionality requested by the user rather than a related simpler or
      more generic task?
  Environment and Integration Completeness:
    filtered_questions:
    - Does the response include all imports, dependencies, configuration, and setup steps needed for the code to run in the
      stated environment?
    - If the task involves a framework, database, API, test runner, or build tool, does the response include the integration
      details needed for that toolchain?
    - If the user asks for parallelism, deployment, database access, file generation, or runtime behavior, does the response
      address the operational constraints rather than only showing isolated code?
    - Does the response avoid code that would fail because it ignores the user's stated file structure, package layout, data
      source, or execution context?
    original_count: 4
    removed_count: 0
    seed_question: Does the response include all imports, dependencies, configuration, and setup steps needed for the code
      to run in the stated environment?
  Debugging and Error Resolution:
    filtered_questions:
    - For debugging requests, does the response identify and address the actual error shown or implied by the user rather
      than giving generic troubleshooting advice?
    - For error-fixing tasks, does the response explain the likely cause of the error and provide a concrete correction that
      matches the shown code or message?
    - Does the response avoid introducing new bugs, undefined names, missing imports, or incompatible API calls while attempting
      to fix the original issue?
    original_count: 3
    removed_count: 0
    seed_question: For debugging requests, does the response identify and address the actual error shown or implied by the
      user rather than giving generic troubleshooting advice?
  Completeness of Runnable Code:
    filtered_questions:
    - Does the response avoid placeholders, ellipses, or omitted sections in places where the user requested directly usable
      code?
    - If the response provides partial code, does it clearly identify what remains to be filled in and why that omission is
      unavoidable from the given prompt?
    - Does the response include enough surrounding code or usage example for the user to apply the solution without guessing
      how the pieces connect?
    original_count: 3
    removed_count: 0
    seed_question: Does the response avoid placeholders, ellipses, or omitted sections in places where the user requested
      directly usable code?
