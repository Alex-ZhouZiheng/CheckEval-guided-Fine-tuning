definition: The response provides substantive value beyond basic correctness by being tailored, useful, calibrated to the
  task, and specific enough to help the user. v5 adds discriminative usefulness questions for generic-vs-specific answers,
  clarification quality, actionable alternatives, and response usefulness under constraints.
dimension: helpfulness_and_usefulness
sub_aspects:
  Contextual Precision:
    filtered_questions:
    - Does the response tailor its advice to the user's specific situation, constraints, or expertise level rather than providing
      a generic answer that could apply to anyone?
    - Does the response incorporate details explicitly provided by the user to make its guidance more relevant to the user's
      stated goal or problem?
    - Does the response adjust its level of explanation or terminology to fit the user's apparent background or requested
      level of expertise?
    - Does the response avoid assumptions that conflict with information the user already provided?
    original_count: 6
    removed_count: 2
    seed_question: Does the response tailor its advice to the user's specific situation, constraints, or expertise level rather
      than providing a generic answer that could apply to anyone?
  Depth of Guidance:
    filtered_questions:
    - Does the response go beyond stating what to do and explain why, providing reasoning, trade-offs, or context that helps
      the user make informed decisions?
    - Does the response include enough underlying reasoning to help the user adapt the advice to a similar but not identical
      situation?
    - Does the response describe relevant trade-offs or limitations of the suggested approach that would affect the user's
      decision-making?
    original_count: 6
    removed_count: 3
    seed_question: Does the response go beyond stating what to do and explain why, providing reasoning, trade-offs, or context
      that helps the user make informed decisions?
  Practical Usability:
    filtered_questions:
    - For advice, planning, troubleshooting, coding, or procedural tasks, does the response include specific steps, methods,
      or procedures that the user could directly follow or apply?
    - For advice, planning, troubleshooting, coding, or procedural tasks, does the response specify relevant tools, methods,
      inputs, or resources needed to apply the advice?
    - For advice, planning, troubleshooting, coding, or procedural tasks, does the response make the next step or takeaway
      clear enough that the user could reasonably act on it?
    original_count: 8
    removed_count: 5
    seed_question: For advice, planning, troubleshooting, coding, or procedural tasks, does the response include specific
      steps, methods, or procedures that the user could directly follow or apply?
  Relevance to User:
    filtered_questions:
    - Does the response focus on what the user actually needs to know, rather than providing information that is related to
      the topic but not useful for their specific question?
    - Does the response prioritize information that directly addresses the user's stated goal or problem?
    - Does the response avoid spending substantial space on background or side information that does not help answer the user's
      specific request?
    - Does the response address the main question or request the user asked, rather than shifting to a different issue?
    original_count: 7
    removed_count: 3
    seed_question: Does the response focus on what the user actually needs to know, rather than providing information that
      is related to the topic but not useful for their specific question?
  Task-Specific Usefulness:
    filtered_questions:
    - Does the response provide information or content that is specifically useful for this user's task rather than a generic
      answer that only loosely matches the topic?
    - Does the response focus on the aspects that would most affect the user's success on the requested task rather than treating
      all details as equally important?
    - Does the response avoid giving a broad overview when the user asked for a concrete artifact, decision, correction, or
      implementation?
    - Does the response provide the kind of help implied by the task context, such as a direct reply, edited wording, code
      fix, continuation, or clarified answer?
    original_count: 4
    removed_count: 0
    seed_question: Does the response provide information or content that is specifically useful for this user's task rather
      than a generic answer that only loosely matches the topic?
  Useful Handling of Limitations:
    filtered_questions:
    - If the request cannot be fully completed as stated, does the response provide a useful partial answer, clarification
      path, or alternative rather than simply failing or hallucinating completion?
    - If the response makes assumptions to proceed, are those assumptions useful, explicit, and consistent with the user's
      context?
    - Does the response help the user move forward despite ambiguity, missing information, or infeasible scope?
    original_count: 3
    removed_count: 0
    seed_question: If the request cannot be fully completed as stated, does the response provide a useful partial answer,
      clarification path, or alternative rather than simply failing or hallucinating completion?
  Quality of Generated Artifact:
    filtered_questions:
    - If the user asks for a written artifact such as a message, proposal, story, scene, summary, or description, does the
      response produce a polished artifact rather than only instructions about how to write one?
    - If the user asks for an edited or improved version of text, does the response improve clarity, grammar, tone, or usefulness
      while preserving the intended meaning?
    - If the user asks for a creative artifact, does the response make the artifact engaging, specific, and coherent rather
      than minimal, repetitive, or generic?
    original_count: 3
    removed_count: 0
    seed_question: If the user asks for a written artifact such as a message, proposal, story, scene, summary, or description,
      does the response produce a polished artifact rather than only instructions about how to write one?
