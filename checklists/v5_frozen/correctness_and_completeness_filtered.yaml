definition: The response is accurate, logically sound, complete for the current user request, and careful about unsupported
  specific claims, context carryover, ambiguous prompts, and hard factual constraints. v5 adds more discriminative questions
  for hallucination control, current-turn context, exact factual specificity, and infeasible or underspecified requests.
dimension: correctness_and_completeness
sub_aspects:
  Coverage Adequacy:
    filtered_questions:
    - Does the response address all the main aspects of the user's question without omitting key information that the user
      would need to consider the answer complete?
    - Does the response resolve the user's central question fully enough that no obvious follow-up is needed to obtain the
      basic requested information?
    - Does the response avoid leaving out important conditions, exceptions, or limitations that are central to the question?
    - When context provided by the user raises important relevant points, does the response address those points rather than
      ignoring them?
    original_count: 8
    removed_count: 4
    seed_question: Does the response address all the main aspects of the user's question without omitting key information
      that the user would need to consider the answer complete?
  Factual Accuracy:
    filtered_questions:
    - Are the factual claims in the response accurate and free from errors that would mislead the user or undermine the usefulness
      of the answer?
    - Does the response avoid making unsupported factual assertions or presenting speculation as established fact?
    - If the response explains a process, mechanism, or causal relationship, is that explanation factually sound?
    - When the prompt depends on domain knowledge, does the response apply that knowledge accurately without introducing factual
      misconceptions?
    - Does the response avoid overclaiming certainty on points that are actually unsupported or unknown?
    original_count: 7
    removed_count: 2
    seed_question: Are the factual claims in the response accurate and free from errors that would mislead the user or undermine
      the usefulness of the answer?
  Logical Consistency:
    filtered_questions:
    - Does the response avoid contradicting itself across different parts of the answer, so that its claims, recommendations,
      and reasoning form a coherent whole?
    - Does the conclusion follow logically from the reasoning presented earlier in the response?
    - Does the response avoid switching positions on the same issue without explanation?
    original_count: 4
    removed_count: 1
    seed_question: Does the response avoid contradicting itself across different parts of the answer, so that its claims,
      recommendations, and reasoning form a coherent whole?
  Ambiguity and Premise Handling:
    filtered_questions:
    - When the prompt contains genuine ambiguity, missing information, or under-specification, does the response surface the
      issue by stating an assumption, asking for clarification, or flagging the gap, rather than silently answering as if
      the input were complete?
    - If the prompt contains a factual mistake or unwarranted premise, does the response identify and correct it rather than
      building further reasoning on top of the error?
    - When the request is impossible, unrealistic, or too large to fully satisfy in the requested form, does the response
      acknowledge the limitation and provide a useful alternative rather than pretending to complete it fully?
    - Does the response avoid silently choosing one interpretation when multiple materially different interpretations would
      lead to different answers?
    original_count: 4
    removed_count: 0
    seed_question: When the prompt contains genuine ambiguity, missing information, or under-specification, does the response
      surface the issue by stating an assumption, asking for clarification, or flagging the gap, rather than silently answering
      as if the input were complete?
  Temporal Awareness:
    filtered_questions:
    - When the prompt asks about time-sensitive facts such as release dates, prices, current state, or recent events, does
      the response acknowledge knowledge cutoff or temporal uncertainty rather than presenting potentially outdated information
      as current truth?
    original_count: 1
    removed_count: 0
    seed_question: When the prompt asks about time-sensitive facts such as release dates, prices, current state, or recent
      events, does the response acknowledge knowledge cutoff or temporal uncertainty rather than presenting potentially outdated
      information as current truth?
  Factual Specificity and Hallucination Control:
    filtered_questions:
    - Does the response avoid inventing specific dates, names, titles, sources, prices, features, citations, or technical
      details not supported by the prompt or reliable general knowledge?
    - When factual uncertainty exists, does the response avoid presenting uncertain or unverifiable information as definite
      fact?
    - Does the response identify the correct specific entity, concept, book, product, API, or rule asked about rather than
      giving a plausible but wrong related answer?
    - Does the response avoid adding irrelevant factual claims that increase the risk of misinformation without helping answer
      the user's request?
    original_count: 4
    removed_count: 0
    seed_question: Does the response avoid inventing specific dates, names, titles, sources, prices, features, citations,
      or technical details not supported by the prompt or reliable general knowledge?
  Conversation Context Accuracy:
    filtered_questions:
    - Does the response answer the latest user request rather than reverting to an earlier topic or a different task from
      the conversation?
    - Does the response correctly use relevant information from prior turns when that context is necessary to understand the
      current request?
    - Does the response avoid contradicting or overwriting facts, roles, constraints, or entities already established in the
      conversation?
    - If the user asks to continue, edit, paraphrase, reply to, or transform prior content, does the response operate on that
      content rather than starting an unrelated answer?
    original_count: 4
    removed_count: 0
    seed_question: Does the response answer the latest user request rather than reverting to an earlier topic or a different
      task from the conversation?
  Critical Error Avoidance:
    filtered_questions:
    - Does the response avoid a central error that would make the answer misleading even if the rest of the response is clear
      or well structured?
    - Does the response avoid choosing a superficially plausible answer when the prompt requires a more specific, constrained,
      or context-dependent answer?
    - Does the response avoid giving a confident answer when the available context is insufficient to determine the correct
      answer?
    original_count: 3
    removed_count: 0
    seed_question: Does the response avoid a central error that would make the answer misleading even if the rest of the response
      is clear or well structured?
